<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Web App</title>
  <style>
    body {
      background: #f7f9fb;
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      padding: 2rem 2.5rem 2rem 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      min-width: 320px;
      max-width: 90vw;
      text-align: center;
      margin: auto;
    }
    h2 {
      color: #333;
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      text-align: left;
      margin-bottom: .3rem;
      margin-top: .7rem;
      color: #444;
    }
    input {
      width: 100%;
      padding: .5rem;
      margin-bottom: .2rem;
      margin-top: .1rem;
      border-radius: 4px;
      border: 1px solid #bbb;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border .2s;
    }
    input:focus {
      outline: none;
      border: 1.5px solid #157afb;
    }
    button {
      margin-top: 1rem;
      padding: .6rem 1.5rem;
      border: none;
      background: #157afb;
      color: #fff;
      border-radius: 4px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover {
      background: #145bcf;
    }
    .secondary-link {
      display: block;
      margin-top: 1.3rem;
      color: #3580f8;
      font-size: 0.96rem;
      text-decoration: none;
      transition: color .2s;
    }
    .secondary-link:hover {
      color: #115cc5;
      text-decoration: underline;
    }
    .logout-btn {
      background: #e74c3c !important;
      margin-top: 2rem;
      color: #fff;
      transition: background .2s;
    }
    .logout-btn:hover {
      background: #c0392b !important;
    }
  </style>
</head>
<body>
  <div class="container" id="loginPage">
    <h2>Login</h2>
    <form id="loginForm">
      <label for="loginUsername">Username</label>
      <input type="text" id="loginUsername" required autofocus autocomplete="username">

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" required autocomplete="current-password">

      <button type="submit">Login</button>
    </form>
    <a href="#" class="secondary-link" id="toRegister">Don't have an account? Register here</a>
  </div>

  <div class="container" id="registerPage" style="display: none;">
    <h2>Register</h2>
    <form id="registerForm">
      <label for="registerName">Name</label>
      <input type="text" id="registerName" required autocomplete="name">

      <label for="registerUsername">Username</label>
      <input type="text" id="registerUsername" required autocomplete="username">

      <label for="registerPassword">Password</label>
      <input type="password" id="registerPassword" required autocomplete="new-password">

      <button type="submit">Register</button>
    </form>
    <a href="#" class="secondary-link" id="toLoginFromRegister">Already have an account? Login here</a>
  </div>
  
  <div class="container" id="homePage" style="display: none;">
    <h2 id="welcomeMsg"></h2>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <script>
    // DOM Elements
    const loginPage = document.getElementById('loginPage');
    const registerPage = document.getElementById('registerPage');
    const homePage = document.getElementById('homePage');
    const toRegister = document.getElementById('toRegister');
    const toLoginFromRegister = document.getElementById('toLoginFromRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const welcomeMsg = document.getElementById('welcomeMsg');
    const logoutBtn = document.getElementById('logoutBtn');

    // -- Helper --
    function showPage(page) {
      loginPage.style.display = 'none';
      registerPage.style.display = 'none';
      homePage.style.display = 'none';
      page.style.display = 'block';
    }

    function getUser() {
      const user = localStorage.getItem('user');
      return user ? JSON.parse(user) : null;
    }
    function saveUser(userObj) {
      localStorage.setItem('user', JSON.stringify(userObj));
    }
    function clearUser() {
      localStorage.removeItem('user');
      localStorage.removeItem('isLoggedIn');
    }
    function setLoggedIn(flag, username=null) {
      if (flag) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('currentUsername', username);
      } else {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('currentUsername');
      }
    }
    function getCurrentUsername() {
      return localStorage.getItem('currentUsername');
    }

    function centerFocus(pageId) {
      setTimeout(() => {
        let input = document.querySelector(`#${pageId} input`);
        if(input) input.focus();
      }, 50);
    }

    //-- Event Listeners --
    toRegister.addEventListener('click', (e) => {
      e.preventDefault();
      showPage(registerPage);
      centerFocus('registerPage');
    });
    toLoginFromRegister.addEventListener('click', (e) => {
      e.preventDefault();
      showPage(loginPage);
      centerFocus('loginPage');
    });

    registerForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('registerName').value.trim();
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value;

      if (!name || !username || !password) {
        alert('Please fill out all fields.');
        return;
      }
      // Save to localStorage
      const userObj = { name, username, password };
      saveUser(userObj);

      alert('Registration successful! Please login.');
      registerForm.reset();
      showPage(loginPage);
      centerFocus('loginPage');
    });

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      const user = getUser();
      if (!user || user.username !== username) {
        alert('User not found. Please register first.');
        showPage(registerPage);
        centerFocus('registerPage');
        return;
      }
      if (user.password !== password) {
        alert('Incorrect password.');
        return;
      }
      // Success
      setLoggedIn(true, username);
      loginForm.reset();
      showHome();
    });

    function showHome() {
      const user = getUser();
      if (user) {
        welcomeMsg.textContent = `Welcome ${user.username}, you have logged in successfully.`;
        showPage(homePage);
      } else {
        // fallback, shouldn't occur
        showPage(loginPage);
      }
    }

    logoutBtn.addEventListener('click', function() {
      setLoggedIn(false);
      showPage(loginPage);
      loginForm.reset();
      centerFocus('loginPage');
    });

    //-- On Page Load: auto show home if logged in
    window.onload = function() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        showHome();
      } else {
        showPage(loginPage);
        centerFocus('loginPage');
      }
    };
  </script>
</body>
</html>
